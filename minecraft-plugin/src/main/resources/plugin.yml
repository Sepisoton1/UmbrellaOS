name: UmbrellaOS
version: 1.0.0
main: com.umbrellaos.plugin.UmbrellaPlugin
api-version: 1.20
depend: [ProtocolLib]
softdepend: [GrimAC]
commands:
  verify:
    description: Verify your Discord account
    usage: /verify
  disc:
    description: Send message to Discord (partial bridge mode)
    usage: /disc <message>
  lang:
    description: Set your chat language
    usage: /lang <language>
  translate:
    description: Toggle auto-translation
    usage: /translate <on|off>
  umbrellaflag:
    description: Internal GrimAC flag handler
    usage: /umbrellaflag <player> <check> <vl>
    permission: umbrella.internal
  umbrellaverify:
    description: Manually link a Discord ID to a Minecraft username
    usage: /umbrellaverify <discordId> <mcUsername>
    permission: umbrellaos.verify
  umbrellaunlink:
    description: Remove a Discord-Minecraft account link
    usage: /umbrellaunlink <discordId>
    permission: umbrellaos.verify
permissions:
  umbrellaos.verify:
    description: Manual Discord-Minecraft linking/unlinking
    default: op
  umbrellaos.staff:
    description: Receive anti-cheat staff alerts in-game
    default: op
